# tmux cheat sheet
# https://tmuxai.dev/tmux-cheat-sheet/

# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# source-file ~/.dotfiles/theme/tmux.conf
set -g @color_inactive "#707b90"
set -g @color_active "#ffffff"

unbind r
bind -r r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g history-limit 25000
set -g set-clipboard on
set -g detach-on-destroy off
set -gq allow-passthrough on
setw -g mode-keys vi
set -g mouse on
set -g renumber-windows on
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
# set -g status-position top
set -g status-left-length 1000
set -g status-right-length 1000

# bind Tab run-shell -b "sesh last"
bind Tab switch-client -l
# bind s display-popup -E -w 75% -h 60% -d "#{pane_current_path}" "tv --cable-dir ~/.config/television/custom-channels sesh" # s like sessions
# bind w display-popup -E -w 75% -h 60% -d "#{pane_current_path}" "tv --cable-dir ~/.config/television/custom-channels tmux-windows" # w like windows
# bind t display-popup -E -w 75% -h 60% -d "#{pane_current_path}" "tv channels" # t like television

bind -n C-Enter new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -n C-n next-window
bind -n C-p previous-window
bind 0 select-window -t 10

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -n -r C-Left resize-pane -L 5
bind -n -r C-Down resize-pane -D 5
bind -n -r C-Up resize-pane -U 5
bind -n -r C-Right resize-pane -R 5

# my tmux styles
set -g status-style "bg=default,fg=#{@color_inactive}"
set -g message-style "bg=default,fg=#{@color_active}"
set -g mode-style "bg=#{@color_inactive},fg=#{@color_active}"
set -g pane-border-style "fg=#{@color_inactive}"
set -g pane-active-border-style "fg=#{@color_active}"
set -g status-left " #[fg=#{?client_prefix,#{@color_active},#{@color_inactive}},bold]􁹛  #[fg=#{@color_active},bold]#S #[fg=#{@color_inactive},nobold] · "
set -g status-right "#[fg=#{@color_inactive}] · #[fg=#{@color_active},bold] #{s|^#{HOME}|~|:pane_current_path} #[fg=#{@color_inactive},nobold] · #[fg=#{@color_active},bold] #(hostname -s) #[fg=#{@color_inactive},nobold]|#[fg=#{@color_active},bold] #(if [ -n \"$SSH_CONNECTION\" ]; then printf ssh; else printf local; fi) "
setw -g window-status-format "#[fg=#{@color_inactive}] #I #W "
setw -g window-status-current-format "#[fg=#{@color_active},bold] #I #W "
setw -g window-status-separator "#[fg=#{@color_inactive}] · "



# --- TPM ----------------------------------

# XDG_DATA_HOME path for TPM and plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# automatic TPM installation
if "test ! -d ~/.local/share/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm'"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-capture-pane-contents 'on'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'
# set -g @plugin 'fcsonline/tmux-thumbs'
# set -g @thumbs-command 'tmux set-buffer -- {} && printf %s {} | pbcopy && tmux display-message "Copied {}"'
# set -g @thumbs-upcase-command 'tmux set-buffer -- {} && printf %s {} | pbcopy && tmux paste-buffer && tmux display-message "Copied {}"'
set -g @plugin 'christoomey/vim-tmux-navigator'

# initializes TMUX plugin manager in a new path (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'
